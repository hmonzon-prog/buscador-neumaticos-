  <script>
    // Catch Babel compilation errors (they only log to console.error)
    const _origConsoleError = console.error;
    console.error = function() {
      var msg = Array.prototype.join.call(arguments, ' ');
      _origConsoleError.apply(console, arguments);
      if (msg.indexOf('transform') !== -1 || msg.indexOf('Babel') !== -1 || msg.indexOf('SyntaxError') !== -1) {
        document.body.innerHTML = '<div style="background:#1e1e2e;color:#f87171;padding:24px;font-family:monospace;font-size:14px;white-space:pre-wrap;max-width:100vw;word-break:break-word">' +
          '<h2 style="color:#fbbf24;margin:0 0 12px">Error de Compilación Babel</h2>' +
          '<div>' + msg.replace(/</g, '&lt;') + '</div></div>';
      }
    };
    window.onerror = (msg, url, line, col, err) => {
      // Ignore cross-origin "Script error." (from Google Sheets JSONP or CDN scripts that fail to load)
      if (msg === 'Script error.' || msg === 'Script error') {
        console.warn('Cross-origin script error ignored:', url || '(no url)');
        return true;
      }
      document.body.innerHTML = '<div style="background:#1e1e2e;color:#f87171;padding:24px;font-family:monospace;font-size:14px;white-space:pre-wrap;max-width:100vw;word-break:break-word">' +
        '<h2 style="color:#fbbf24;margin:0 0 12px">Error Global</h2>' +
        '<div>' + (msg || '') + '</div>' +
        '<div style="margin-top:4px;color:#94a3b8">' + (url ? url + ':' + line + ':' + col : '') + '</div>' +
        (err && err.stack ? '<div style="margin-top:8px;color:#94a3b8">' + err.stack + '</div>' : '') + '</div>';
      return true;
    };
    window.addEventListener('unhandledrejection', (e) => {
      const err = e.reason;
      document.body.innerHTML = '<div style="background:#1e1e2e;color:#f87171;padding:24px;font-family:monospace;font-size:14px;white-space:pre-wrap;max-width:100vw;word-break:break-word">' +
        '<h2 style="color:#fbbf24;margin:0 0 12px">Promise Rejection</h2>' +
        '<div>' + ((err && err.message) || String(err) || 'Unknown') + '</div>' +
        (err && err.stack ? '<div style="margin-top:8px;color:#94a3b8">' + err.stack + '</div>' : '') + '</div>';
    });
    // Detect if Babel silently failed (timeout check)
    setTimeout(function() {
      if (!document.getElementById('root') || document.getElementById('root').children.length === 0) {
        if (!document.querySelector('[style*="f87171"]')) {  // no error already shown
          document.body.innerHTML = '<div style="background:#1e1e2e;color:#fbbf24;padding:24px;font-family:monospace;font-size:14px;line-height:1.6">' +
            '<h2 style="color:#f87171;margin:0 0 12px">Sin Contenido</h2>' +
            '<div>La p&aacute;gina no mostr&oacute; contenido despu&eacute;s de 3 segundos.</div>' +
            '<div style="margin-top:8px;color:#94a3b8">Posibles causas: error de compilaci&oacute;n Babel, problema de red con CDN, o error de JavaScript.</div>' +
            '<div style="margin-top:12px;color:#60a5fa">Abr&iacute; la consola del navegador (F12 &rarr; Console) para ver errores.</div></div>';
        }
      }
    }, 3000);
  </script>

        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path>
      </svg>

    // --- MAIN APP COMPONENT ---
    function App() {
      const [stockData, setStockData] = useState(() => {
        const saved = localStorage.getItem("deposito_stock_data");
        return saved ? JSON.parse(saved) : INITIAL_MOCK_DATA;
      });

      const [metadata, setMetadata] = useState(() => {
        const savedMeta = localStorage.getItem("deposito_stock_metadata");
        return savedMeta ? JSON.parse(savedMeta) : { filename: "Sin datos", date: "—" };
      });

      const [selectedBrand, setSelectedBrand] = useState("");
      const [searchQuery, setSearchQuery] = useState("");
      const [locationQuery, setLocationQuery] = useState("");
      const [selectedSku, setSelectedSku] = useState("");
      const [sortConfig, setSortConfig] = useState({ key: "LOC", direction: "asc" });
      const [viewMode, setViewMode] = useState("table");
      const [errorMessage, setErrorMessage] = useState("");
      const [successMessage, setSuccessMessage] = useState("");
      const [isLoading, setIsLoading] = useState(false);
      const [isRefreshing, setIsRefreshing] = useState(false);
      const [sheetUrl, setSheetUrl] = useState("");
      const [showUrlInput, setShowUrlInput] = useState(false);
      const [simpleMode, setSimpleMode] = useState(window.innerWidth < 768);
      const [showSkuCompare, setShowSkuCompare] = useState(false);
      const [userSkuText, setUserSkuText] = useState("");

      const SHEET_ID = "1xFGdRai5r0BOGf4ovDJXVSrZJhNycX0HG1y5FxghKK8";

      const normalize = (s) => String(s).toLowerCase().trim().replace(/[^a-záéíóúñ0-9]/g, "");

      const parseGvizTable = (table) => {
        const labels = table.cols.map(c => c.label || c.id || "");
        const colPatterns = [
          { key: "SKU", patterns: ["sku", "codigo", "cod", "articulo", "art", "referencia", "ref", "nro", "numero", "codigoarticulo"] },
          { key: "Descrip", patterns: ["descrip", "desc", "descripcion", "detalle", "neumatico", "medida", "producto", "nombre", "item"] },
          { key: "Cant", patterns: ["cant", "stock", "cantidad", "unidades", "fisico", "saldo", "existencia", "disponible", "total"] },
          { key: "LOC", patterns: ["loc", "ubicacion", "posicion", "slot", "sector", "estante", "pasillo", "deposito", "almacen", "celda", "ubic"] },
          { key: "Marca", patterns: ["marca", "brand", "fab", "fabricante", "mrc"] },
          { key: "Estado", patterns: ["estado", "sit", "situacion", "status", "est", "condicion"] }
        ];
        const idx = {};
        for (const cp of colPatterns) {
          let found = -1;
          for (let i = 0; i < labels.length; i++) {
            const nl = normalize(labels[i]);
            if (nl && cp.patterns.some(p => nl === p || nl.includes(p))) { found = i; break; }
          }
          idx[cp.key] = found;
        }
        if (idx.Descrip === -1 || idx.LOC === -1) {
          throw new Error(
            "No se encontraron columnas 'Descrip' y 'LOC'.\n" +
            "Columnas del sheet: [" + labels.map((l, i) => (l || `(vacía ${i})`)).join(" | ") + "]\n" +
            "Asegurate que la primera fila tenga los encabezados correctos."
          );
        }
        return table.rows.map(row => {
          const get = (key) => (idx[key] !== -1 && row.c[idx[key]] ? String(row.c[idx[key]].v || "").trim() : "");
          const cantVal = idx.Cant !== -1 ? (parseInt((row.c[idx.Cant] ? row.c[idx.Cant].v : ""), 10) || 0) : 0;
          return {
            SKU: get("SKU"),
            Descrip: get("Descrip"),
            Cant: cantVal,
            LOC: idx.LOC !== -1 ? get("LOC").toUpperCase() : "SIN LOC",
            Marca: (idx.Marca !== -1 ? get("Marca").toUpperCase() : "SIN MARCA") || "DESCONOCIDA",
            Estado: (idx.Estado !== -1 ? get("Estado").toUpperCase() : "OK") || "OK"
          };
        }).filter(item => item.Descrip || item.SKU);
      };

      let _gvizCbCounter = 0;

      const fetchGvizJsonp = (sheetId, timeoutMs = 15000) => {
        return new Promise((resolve, reject) => {
          const cb = "_gs_cb_" + (++_gvizCbCounter);
          const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json;responseHandler:${cb}&gid=0`;
          const timedOut = { current: false };
          const timer = setTimeout(() => {
            timedOut.current = true;
            delete window[cb];
            reject(new Error("Tiempo de espera agotado (15s). Asegurate de que el sheet esté compartido como público."));
          }, timeoutMs);
          window[cb] = (resp) => {
            clearTimeout(timer);
            delete window[cb];
            if (timedOut.current) return;
            if (resp.status === "error") {
              reject(new Error(resp.errors ? resp.errors[0].message : "Error del sheet"));
            } else {
              resolve(resp.table);
            }
          };
          const s = document.createElement("script");
          s.id = cb;
          s.src = url;
          s.onerror = () => {
            clearTimeout(timer);
            delete window[cb];
            if (!timedOut.current) reject(new Error("Error de red al conectar con Google Sheets"));
          };
          document.head.appendChild(s);
        });
      };

      const updateDataStore = (data, filename) => {
        const meta = { filename, date: new Date().toLocaleString() };
        setStockData(data);
        setMetadata(meta);
        localStorage.setItem("deposito_stock_data", JSON.stringify(data));
        localStorage.setItem("deposito_stock_metadata", JSON.stringify(meta));
        setSelectedBrand("");
        setSearchQuery("");
        setLocationQuery("");
      };

      const fetchStockData = async (silent = false) => {
        if (!silent) setIsLoading(true);
        setErrorMessage("");
        setShowUrlInput(false);
        try {
          const url = sheetUrl.trim() || SHEET_ID;
          let parsed;
          if (url.startsWith("http")) {
            const resp = await fetch(url);
            if (!resp.ok) throw new Error("Error HTTP " + resp.status);
            const csv = await resp.text();
            const lines = csv.split("\n").filter(l => l.trim());

                  <span className="infor-badge infor-badge-ok text-[11px]">
                    Marca: {selectedBrand}
                    <button onClick={() => setSelectedBrand("")} className="hover:opacity-70 cursor-pointer"><CloseIcon /></button>
                  </span>
                )}
                {searchQuery && (
                  <span className="infor-badge infor-badge-ok text-[11px]">
                    "{searchQuery}"
                    <button onClick={() => setSearchQuery("")} className="hover:opacity-70 cursor-pointer"><CloseIcon /></button>
                  </span>
                )}
                {locationQuery && (
                  <span className="infor-badge infor-badge-ok text-[11px]">
                    LOC: {locationQuery}
                    <button onClick={() => setLocationQuery("")} className="hover:opacity-70 cursor-pointer"><CloseIcon /></button>
                  </span>
                )}
                <span className="ml-auto text-xs font-medium" style={{color: 'var(--ids-color-palette-slate-30)'}}>
                  {selectedSku ? (
                    <>Ubicaciones: <strong style={{color: 'var(--ids-color-palette-azure-60)'}}>{filteredData.length}</strong></>
                  ) : locationQuery ? (
                    <>Resultados: <strong style={{color: 'var(--ids-color-palette-azure-60)'}}>{filteredData.length}</strong> registros</>
                  ) : (
                    <><strong style={{color: 'var(--ids-color-palette-azure-60)'}}>{skuAggregates.length}</strong> SKU{skuAggregates.length !== 1 ? 's' : ''} de {stockData.length}</>
                  )}
                </span>
              </div>
            )}
          </section>

          {/* SKU LIST (search results grouped by SKU) — Infor Cards */}
          {!selectedSku && !locationQuery && (selectedBrand || searchQuery) && (
          <section className="infor-card overflow-hidden">
            <div className="px-4 py-3 flex items-center justify-between" style={{borderBottom: '1px solid var(--ids-soho-border)', background: 'rgba(0,0,0,0.15)'}}>
              <h3 className="text-sm font-bold" style={{color: 'var(--ids-color-palette-slate-30)'}}>
                SKU Encontrados
              </h3>
              <span className="text-xs font-mono px-2 py-0.5 rounded" style={{background: 'var(--ids-color-palette-slate-80)', color: 'var(--ids-color-palette-slate-30)'}}>
                {skuAggregates.length}
              </span>
            </div>
            {skuAggregates.length > 0 ? (
              <div className="p-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                {skuAggregates.map(sku => (
                  <button
                    key={sku.SKU}
                    onClick={() => setSelectedSku(sku.SKU)}
                    className="text-left w-full p-4 rounded infor-card cursor-pointer transition-all duration-200 hover:border-azure-60"
                    style={{background: 'var(--ids-color-palette-slate-80)', border: '1px solid var(--ids-soho-border)'}}
                  >
                    <div className="font-mono font-bold text-sm" style={{color: 'var(--ids-color-palette-azure-60)'}}>
                      {sku.SKU || <span className="italic opacity-50">Sin SKU</span>}
                    </div>
                    <div className="font-semibold text-sm mt-1 line-clamp-2 leading-snug" style={{color: 'var(--ids-color-palette-slate-10)'}}>
                      {sku.Descrip}
                    </div>
                    <div className="flex items-center gap-2 mt-2 text-xs" style={{color: 'var(--ids-color-palette-slate-50)'}}>
                      <span className="px-1.5 py-0.5 rounded text-[10px] font-bold uppercase" style={{background: 'rgba(255,255,255,0.05)', border: '1px solid rgba(255,255,255,0.08)'}}>
                        {sku.Marca}
                      </span>
                      <span style={{color: 'var(--ids-color-palette-emerald-60)'}}>{sku.totalCant} u.</span>
                      <span>|</span>
                      <span>{sku.locationCount} ubic.{sku.locationCount !== 1 ? 's' : ''}</span>
                    </div>
                  </button>
                ))}
              </div>
            ) : (
              <div className="py-12 text-center text-sm" style={{color: 'var(--ids-color-palette-slate-50)'}}>
                No se encontraron SKU que coincidan con la búsqueda.
              </div>
            )}
          </section>
          )}

          {/* MÓDULO 4: VISTA DE DATOS (detail para SKU seleccionado o tabla completa) — Infor Style */}
          {(selectedSku || locationQuery || !(selectedBrand || searchQuery)) && (
          <section className="infor-card overflow-hidden flex flex-col">
            <div className="px-4 py-3 flex flex-col sm:flex-row sm:items-center justify-between gap-3" style={{borderBottom: '1px solid var(--ids-soho-border)', background: 'rgba(0,0,0,0.15)'}}>
              <div className="flex items-center gap-2">
                {selectedSku ? (
                  <>
                    <button
                      onClick={() => setSelectedSku("")}
                      className="infor-btn text-xs font-bold px-2 py-1 flex items-center gap-1" style={{color: 'var(--ids-color-palette-azure-60)'}}
                    >
                      <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M15 19l-7-7 7-7"/></svg>
                      Volver
                    </button>
                    <div className="w-px h-4" style={{background: 'var(--ids-soho-border)'}}></div>
                    <h3 className="text-sm font-bold font-mono" style={{color: 'var(--ids-color-palette-azure-60)'}}>
                      {selectedSku}
                    </h3>
                    <span className="text-xs font-mono px-2 py-0.5 rounded" style={{background: 'var(--ids-color-palette-slate-80)', color: 'var(--ids-color-palette-slate-30)'}}>
                      {sortedData.length}
                    </span>
                  </>
                ) : (
                  <>
                    <h3 className="text-sm font-bold" style={{color: 'var(--ids-color-palette-slate-30)'}}>
                      Ubicaciones y Stock
                    </h3>
                    <span className="text-xs font-mono px-2 py-0.5 rounded" style={{background: 'var(--ids-color-palette-slate-80)', color: 'var(--ids-color-palette-slate-30)'}}>
                      {sortedData.length}
                    </span>
                  </>
                )}
              </div>

              <div className="flex items-center gap-3 self-end sm:self-auto">
                <div className="flex items-center gap-1.5 text-xs" style={{color: 'var(--ids-color-palette-slate-50)'}}>
                  <span>Mostrar:</span>
                  <select
                    value={rowsPerPage}
                    onChange={(e) => setRowsPerPage(Number(e.target.value))}
                    className="infor-select text-xs py-1"
                  >
                    <option value={10}>10 filas</option>
                    <option value={25}>25 filas</option>
                    <option value={50}>50 filas</option>
                  </select>
                </div>

                <div className="w-px h-4" style={{background: 'var(--ids-soho-border)'}}></div>

                <div className="flex gap-0.5 rounded overflow-hidden" style={{border: '1px solid var(--ids-soho-border)'}}>
                  <button
                    onClick={() => setViewMode("table")}
                    className={`p-1.5 transition-all cursor-pointer ${
                      viewMode === "table" 
                        ? 'text-white' 
                        : 'text-white/40 hover:text-white/70'
                    }`}
                    style={viewMode === "table" ? {background: 'var(--ids-color-palette-azure-60)'} : {}}
                    title="Vista de Tabla"
                  >
                    <LayoutListIcon />
                  </button>
                  <button
                    onClick={() => setViewMode("grid")}
                    className={`p-1.5 transition-all cursor-pointer ${
                      viewMode === "grid" 
                        ? 'text-white' 
                        : 'text-white/40 hover:text-white/70'
                    }`}
                    style={viewMode === "grid" ? {background: 'var(--ids-color-palette-azure-60)'} : {}}
                    title="Vista de Tarjetas"
                  >
                    <LayoutGridIcon />
                  </button>
                </div>
              </div>
            </div>

            {viewMode === "table" ? (
              <div className="overflow-x-auto">
                <table className="w-full text-left text-sm border-collapse">
                  <thead>
                    <tr style={{background: 'var(--ids-color-palette-slate-90)', borderBottom: '1px solid var(--ids-soho-border)', color: 'var(--ids-color-palette-slate-30)', fontWeight: 600, textTransform: 'uppercase', fontSize: '11px', letterSpacing: '0.04em'}}>
                      <th className="py-3 px-4 cursor-pointer select-none" style={{color: 'var(--ids-color-palette-slate-30)'}} onClick={() => requestSort("SKU")}>
                        SKU {sortConfig.key === "SKU" ? (sortConfig.direction === "asc" ? <ChevronIcon direction="up" /> : <ChevronIcon direction="down" />) : <ChevronIcon direction="both" />}
                      </th>
                      <th className="py-3 px-4 cursor-pointer select-none" style={{color: 'var(--ids-color-palette-slate-30)'}} onClick={() => requestSort("Marca")}>
                        Marca {sortConfig.key === "Marca" ? (sortConfig.direction === "asc" ? <ChevronIcon direction="up" /> : <ChevronIcon direction="down" />) : <ChevronIcon direction="both" />}
                      </th>
                      <th className="py-3 px-4 cursor-pointer select-none" style={{color: 'var(--ids-color-palette-slate-30)'}} onClick={() => requestSort("Descrip")}>
                        Descripción {sortConfig.key === "Descrip" ? (sortConfig.direction === "asc" ? <ChevronIcon direction="up" /> : <ChevronIcon direction="down" />) : <ChevronIcon direction="both" />}
                      </th>
                      <th className="py-3 px-4 cursor-pointer select-none" style={{color: 'var(--ids-color-palette-slate-30)'}} onClick={() => requestSort("LOC")}>
                        Ubicación {sortConfig.key === "LOC" ? (sortConfig.direction === "asc" ? <ChevronIcon direction="up" /> : <ChevronIcon direction="down" />) : <ChevronIcon direction="both" />}
                      </th>
                      <th className="py-3 px-4 cursor-pointer select-none text-right" style={{color: 'var(--ids-color-palette-slate-30)'}} onClick={() => requestSort("Cant")}>
                        Stock {sortConfig.key === "Cant" ? (sortConfig.direction === "asc" ? <ChevronIcon direction="up" /> : <ChevronIcon direction="down" />) : <ChevronIcon direction="both" />}
                      </th>
                      <th className="py-3 px-4 cursor-pointer select-none" style={{color: 'var(--ids-color-palette-slate-30)'}} onClick={() => requestSort("Estado")}>
                        Estado {sortConfig.key === "Estado" ? (sortConfig.direction === "asc" ? <ChevronIcon direction="up" /> : <ChevronIcon direction="down" />) : <ChevronIcon direction="both" />}
                      </th>
                    </tr>
                  </thead>
                  <tbody>
                    {paginatedData.length > 0 ? (
                      paginatedData.map((row, idx) => {
                        const isWarning = row.Estado !== "OK" || row.Cant === 0;
                        return (
                          <tr
                            key={idx}
                            style={{borderBottom: '1px solid rgba(255,255,255,0.04)', background: isWarning ? 'rgba(230,60,60,0.06)' : (idx % 2 === 0 ? 'rgba(255,255,255,0.02)' : 'transparent')}}
                            onMouseEnter={e => e.currentTarget.style.background = 'rgba(255,255,255,0.05)'}
                            onMouseLeave={e => e.currentTarget.style.background = isWarning ? 'rgba(230,60,60,0.06)' : (idx % 2 === 0 ? 'rgba(255,255,255,0.02)' : 'transparent')}
                          >
                            <td className="py-2.5 px-4 font-mono font-semibold text-xs" style={{color: 'var(--ids-color-palette-slate-40)'}}>
                              {row.SKU || <span style={{color: 'var(--ids-color-palette-slate-60)', fontStyle: 'italic'}}>Sin SKU</span>}
                            </td>
                            <td className="py-2.5 px-4">
                              <span className="text-[10px] font-bold uppercase px-2 py-0.5 rounded" style={{background: 'var(--ids-color-palette-slate-80)', color: 'var(--ids-color-palette-slate-40)', border: '1px solid rgba(255,255,255,0.06)'}}>
                                {row.Marca}
                              </span>
                            </td>
                            <td className="py-2.5 px-4 text-xs max-w-xs md:max-w-md truncate" style={{color: 'var(--ids-color-palette-slate-40)'}} title={row.Descrip}>
                              {row.Descrip}
                            </td>
                            <td className="py-2.5 px-4">
                              <span className="text-xs font-bold font-mono px-2 py-0.5 rounded" style={{background: 'rgba(5,99,194,0.12)', color: 'var(--ids-color-palette-azure-50)', border: '1px solid rgba(5,99,194,0.2)'}}>
                                {row.LOC}
                              </span>
                            </td>
                            <td className="py-2.5 px-4 text-right font-mono font-semibold text-xs" style={{color: 'var(--ids-color-palette-slate-30)'}}>
                              {row.Cant === 0 ? (
                                <span className="text-xs font-bold px-2 py-0.5 rounded" style={{background: 'rgba(230,60,60,0.15)', color: 'var(--ids-color-palette-ruby-50)', border: '1px solid rgba(230,60,60,0.25)'}}>
                                  0 (Agotado)
                                </span>
                              ) : (
                                <span>{row.Cant} u.</span>
                              )}
                            </td>
                            <td className="py-2.5 px-4">
                              {row.Estado === "OK" ? (
                                <span className="text-xs font-bold inline-flex items-center gap-1 px-2 py-0.5 rounded" style={{background: 'rgba(80,180,80,0.12)', color: 'var(--ids-color-palette-emerald-50)', border: '1px solid rgba(80,180,80,0.2)'}}>
                                  <span className="w-1.5 h-1.5 rounded-full" style={{background: 'var(--ids-color-palette-emerald-50)'}}></span>
                                  {row.Estado}
                                </span>
                              ) : (
                                <span className="text-xs font-bold inline-flex items-center gap-1 px-2 py-0.5 rounded" style={{background: 'rgba(230,60,60,0.12)', color: 'var(--ids-color-palette-ruby-50)', border: '1px solid rgba(230,60,60,0.2)'}}>
                                  <span className="w-1.5 h-1.5 rounded-full" style={{background: 'var(--ids-color-palette-ruby-50)'}}></span>
                                  {row.Estado}
                                </span>
                              )}
                            </td>
                          </tr>
                        );
                      })
                    ) : (
                      <tr>
                        <td colSpan="6" className="py-12 text-center text-sm" style={{color: 'var(--ids-color-palette-slate-50)'}}>
                          No se encontraron artículos de stock que coincidan con la búsqueda.
                        </td>
                      </tr>
                    )}
                  </tbody>
                </table>
              </div>
            ) : (
              <div className="p-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                {paginatedData.length > 0 ? (
                  paginatedData.map((row, idx) => {
                    const isWarning = row.Estado !== "OK" || row.Cant === 0;
                    return (
                      <div
                        key={idx}
                        className="p-3 relative"
                        style={{background: isWarning ? 'rgba(230,60,60,0.05)' : 'rgba(255,255,255,0.03)', border: '1px solid', borderColor: isWarning ? 'rgba(230,60,60,0.2)' : 'var(--ids-soho-border)', borderRadius: '6px'}}
                      >
                        <div className="flex items-center justify-between gap-2 mb-2">
                          <span className="text-[10px] font-bold uppercase px-2 py-0.5 rounded" style={{background: 'var(--ids-color-palette-slate-80)', color: 'var(--ids-color-palette-slate-50)', border: '1px solid rgba(255,255,255,0.05)'}}>
                            {row.Marca}
                          </span>

                          {row.Estado === "OK" ? (
                            <span className="text-[10px] font-bold px-2 py-0.5 rounded" style={{background: 'rgba(80,180,80,0.1)', color: 'var(--ids-color-palette-emerald-50)', border: '1px solid rgba(80,180,80,0.15)'}}>
                              {row.Estado}
                            </span>
                          ) : (
                            <span className="text-[10px] font-bold px-2 py-0.5 rounded" style={{background: 'rgba(230,60,60,0.1)', color: 'var(--ids-color-palette-ruby-50)', border: '1px solid rgba(230,60,60,0.15)'}}>
                              {row.Estado}
                            </span>
                          )}
                        </div>

                        <h4 className="text-sm font-semibold line-clamp-2 mb-3 h-10" style={{color: 'var(--ids-color-palette-slate-30)'}}>
                          {row.Descrip}
                        </h4>

                        <div className="flex items-center justify-between pt-2 text-xs" style={{borderTop: '1px solid rgba(255,255,255,0.05)'}}>
                          <div>
                            <span className="block text-[10px] uppercase font-bold tracking-wider" style={{color: 'var(--ids-color-palette-slate-50)'}}>Ubicación</span>
                            <span className="font-mono font-bold text-sm" style={{color: 'var(--ids-color-palette-azure-50)'}}>
                              {row.LOC}
                            </span>
                          </div>

                          <div className="text-right">
                            <span className="block text-[10px] uppercase font-bold tracking-wider" style={{color: 'var(--ids-color-palette-slate-50)'}}>Stock</span>
                            {row.Cant === 0 ? (
                              <span className="font-mono font-bold text-xs" style={{color: 'var(--ids-color-palette-ruby-50)'}}>
                                Agotado (0)
                              </span>
                            ) : (
                              <span className="font-mono font-bold text-sm" style={{color: 'var(--ids-color-palette-slate-30)'}}>
                                {row.Cant} u.
                              </span>
                            )}
                          </div>
                        </div>

                        <div className="mt-2 pt-1.5 flex items-center justify-between text-[10px] font-mono" style={{borderTop: '1px solid rgba(255,255,255,0.03)', color: 'var(--ids-color-palette-slate-50)'}}>
                          <span>SKU:</span>
                          <span style={{color: 'var(--ids-color-palette-slate-40)', fontWeight: 600}}>{row.SKU || "SIN SKU"}</span>
                        </div>
                      </div>
                    );
                  })
                ) : (
                  <div className="col-span-full py-12 text-center text-sm" style={{color: 'var(--ids-color-palette-slate-50)'}}>
                    No se encontraron artículos de stock que coincidan con la búsqueda.
                  </div>
                )}
              </div>
            )}

            {totalPages > 1 && (
              <div className="px-4 py-3 flex flex-col sm:flex-row items-center justify-between gap-3 select-none" style={{borderTop: '1px solid var(--ids-soho-border)', background: 'rgba(0,0,0,0.15)'}}>
                <span className="text-xs" style={{color: 'var(--ids-color-palette-slate-50)'}}>
                  Mostrando del <strong style={{color: 'var(--ids-color-palette-slate-30)'}}>{(currentPage - 1) * rowsPerPage + 1}</strong> al <strong style={{color: 'var(--ids-color-palette-slate-30)'}}>{Math.min(currentPage * rowsPerPage, sortedData.length)}</strong> de <strong style={{color: 'var(--ids-color-palette-azure-50)'}}>{sortedData.length}</strong> posiciones encontradas.
                </span>

                <div className="flex items-center gap-1">
                  <button
                    onClick={() => setCurrentPage(prev => Math.max(prev - 1, 1))}
                    disabled={currentPage === 1}
                    className="text-xs font-semibold px-2.5 py-1.5 cursor-pointer disabled:opacity-35"
                    style={{background: 'rgba(255,255,255,0.05)', border: '1px solid var(--ids-soho-border)', borderRadius: '4px', color: 'var(--ids-color-palette-slate-40)'}}
                  >
                    Anterior
                  </button>

                  <div className="flex items-center gap-0.5">
                    {Array.from({ length: totalPages }, (_, i) => i + 1)
                      .filter(p => p === 1 || p === totalPages || Math.abs(p - currentPage) <= 1)
                      .map((p, idx, arr) => {
                        const showDots = idx > 0 && p - arr[idx - 1] > 1;
                        return (
                          <React.Fragment key={p}>
                            {showDots && <span className="px-1 text-xs" style={{color: 'var(--ids-color-palette-slate-60)'}}>...</span>}
                            <button
                              onClick={() => setCurrentPage(p)}
                              className="w-7 h-7 text-xs font-bold cursor-pointer"
                              style={currentPage === p
                                ? {background: 'var(--ids-color-palette-azure-60)', color: '#fff', border: 'none', borderRadius: '4px'}
                                : {background: 'rgba(255,255,255,0.04)', color: 'var(--ids-color-palette-slate-40)', border: '1px solid var(--ids-soho-border)', borderRadius: '4px'}
                              }
                            >
                              {p}
                            </button>
                          </React.Fragment>
                        );
                      })}
                  </div>

                  <button
                    onClick={() => setCurrentPage(prev => Math.min(prev + 1, totalPages))}
                    disabled={currentPage === totalPages}
                    className="text-xs font-semibold px-2.5 py-1.5 cursor-pointer disabled:opacity-35"
                    style={{background: 'rgba(255,255,255,0.05)', border: '1px solid var(--ids-soho-border)', borderRadius: '4px', color: 'var(--ids-color-palette-slate-40)'}}
                  >
                    Siguiente
                  </button>
                </div>
              </div>
            )}
          </section>
          )}

          {!simpleMode && (
          <footer className="infor-card p-4 flex flex-col sm:flex-row items-start sm:items-center gap-4 text-xs leading-relaxed" style={{color: 'var(--ids-color-palette-slate-50)'}}>
            <div className="p-2 shrink-0" style={{background: 'rgba(255,255,255,0.03)', border: '1px solid var(--ids-soho-border)', borderRadius: '6px'}}>
              <InfoIcon />
            </div>
            <div>
              <p className="font-semibold" style={{color: 'var(--ids-color-palette-slate-30)'}}>Google Sheets — Datos compartidos en tiempo real</p>
              <p className="mt-0.5">
                Los datos se obtienen desde un <strong style={{color: 'var(--ids-color-palette-azure-50)'}}>Google Sheet público</strong>. Todos los dispositivos que abren este archivo ven la misma información sin necesidad de configuración ni sincronización P2P.
              </p>
              <p className="mt-1" style={{color: 'var(--ids-color-palette-slate-50)'}}>
                Los datos se cachean en <strong style={{color: 'var(--ids-color-palette-slate-30)'}}>localStorage</strong> para funcionar offline. Se actualizan automáticamente cada 5 minutos. Usá el botón <strong style={{color: 'var(--ids-color-palette-azure-50)'}}>Actualizar</strong> para forzar una recarga.
              </p>
            </div>
          </footer>
          )}

        </div>
      );
    }

    // Render components
    try {
      const rootElement = document.getElementById("root");
      if (!rootElement) throw new Error("No se encontró #root");
      const root = ReactDOM.createRoot(rootElement);
      root.render(<App />);
    } catch (err) {
      document.body.innerHTML = '<div style="background:#1e1e2e;color:#f87171;padding:24px;font-family:monospace;font-size:14px;white-space:pre-wrap;max-width:100vw;word-break:break-word">' +
        '<h2 style="color:#fbbf24;margin:0 0 12px">Error de Render</h2>' +
        '<div>' + (err.message || String(err)) + '</div>' +
        '<div style="margin-top:8px;color:#94a3b8">' + (err.stack || '') + '</div></div>';
    }
  </script>

</body>
</html>
